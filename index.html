    <!-- Meta Pixel -->

      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#0052FF',
                            hover: '#0040cc',
                            dark: '#0A0A0A',
                            gray: '#1A1A1A'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .glass-panel { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gemini-gradient { background: linear-gradient(90deg, #1d4ed8, #8b5cf6, #d946ef); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // Global APIs and Configs
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const calendlyUrl = "https://calendly.com/your-booking-link"; // Replace with your real Calendly

        // SVGs
        const CheckIcon = () => <svg className="w-5 h-5 text-brand-blue flex-shrink-0 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>;
        const CloseIcon = () => <svg className="w-6 h-6 text-gray-400 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
        const LoadingSpinner = () => <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>;

        const HowItWorks = () => {
            const steps = [
                { num: "01", title: "Run Free Revenue Leak Audit", desc: "Complete our 2-minute operational diagnostic tool." },
                { num: "02", title: "Receive AI-Powered Analysis", desc: "Instantly identify bottlenecks, missing revenue, and hours wasted." },
                { num: "03", title: "Book Strategy Call", desc: "Review your custom blueprint with our operations engineers." },
                { num: "04", title: "Implement Systems", desc: "We build and deploy your custom CRM and AI automations." },
                { num: "05", title: "Recover Time & Revenue", desc: "Watch your margins increase and support tickets vanish." }
            ];

            return (
                <section className="bg-brand-dark py-24 border-t border-gray-900">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-5xl font-bold mb-4">How OpsPilot Works</h2>
                            <p className="text-gray-400 max-w-2xl mx-auto">From chaos to clarity in five transparent steps.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-6 relative">
                            <div className="hidden md:block absolute top-1/2 left-0 w-full h-0.5 bg-gray-800 -z-10 -translate-y-1/2"></div>
                            {steps.map((step, i) => (
                                <div key={i} className="bg-black border border-gray-800 rounded-2xl p-6 relative flex flex-col items-center text-center">
                                    <div className="w-12 h-12 bg-brand-blue text-white rounded-full flex items-center justify-center font-bold text-lg mb-4 shadow-[0_0_15px_rgba(0,82,255,0.4)]">
                                        {step.num}
                                    </div>
                                    <h3 className="text-lg font-bold mb-2 text-white">{step.title}</h3>
                                    <p className="text-sm text-gray-400">{step.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const HeroAudit = () => {
            const [step, setStep] = useState(1);
            const [auditData, setAuditData] = useState({ revenue: '', employees: '', tickets: '', bottleneck: '', software: '', email: '' });
            const [isCalculating, setIsCalculating] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const handleInput = (key, val) => setAuditData(prev => ({ ...prev, [key]: val }));

            const runRealAudit = async () => {
                setIsCalculating(true);
                setStep(7); // Loading screen
                setError('');

                // Track Event in GA & Meta
                if (window.gtag) window.gtag('event', 'audit_started', { event_category: 'Lead Gen' });
                if (window.fbq) window.fbq('track', 'Lead');

                try {
                    const response = await fetch('/api/audit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(auditData)
                    });
                    
                    if (!response.ok) throw new Error('Network response was not ok');
                    
                    const parsedResult = await response.json();
                    setResult(parsedResult);
                    
                    if (window.gtag) window.gtag('event', 'audit_completed', { event_category: 'Lead Gen' });
                } catch (err) {
                    console.error("Audit API Failed", err);
                    // Fallback for demonstration if API isn't deployed yet
                    setResult({
                        efficiencyScore: 48, estSavings: "$36,500", estHoursSaved: 45, 
                        bottleneckDetail: "Severe labor waste in manual data routing.", 
                        opportunities: ["AI Ticket Resolution", "Automated Refund Workflows"], 
                        recommendations: ["Implement AI Support", "Sync Shopify to CRM automatically"]
                    });
                } finally {
                    setIsCalculating(false);
                }
            };

            const advance = (key, val) => {
                handleInput(key, val);
                setStep(s => s + 1);
            };

            return (
                <main className="max-w-7xl mx-auto px-8 pt-24 lg:pt-36 pb-20 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center min-h-[90vh]">
                    <div className="animate-fade-in">
                        <div className="inline-block border border-gray-800 bg-gray-900/50 text-gray-300 px-4 py-1.5 rounded-full text-xs font-semibold mb-6 uppercase tracking-wider">
                            For Shopify & DTC Brands ($1M-$10M)
                        </div>
                        <h1 className="text-5xl md:text-6xl lg:text-7xl font-extrabold tracking-tight mb-6 leading-[1.1]">
                            Your Store Is Losing Money Every Day. Find Out Where.
                        </h1>
                        <p className="text-xl text-gray-400 mb-10 leading-relaxed max-w-lg">
                            Run a free AI-powered operations audit and discover hidden inefficiencies, manual processes, customer support bottlenecks, and revenue leaks inside your business.
                        </p>
                        
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={() => document.getElementById('audit-tool').scrollIntoView({behavior: 'smooth'})} className="bg-brand-blue hover:bg-brand-hover text-white font-bold py-4 px-8 rounded-xl transition-all shadow-[0_0_20px_rgba(0,82,255,0.3)] text-lg text-center">
                                Run Free Operations Audit
                            </button>
                            <button onClick={() => document.getElementById('case-studies').scrollIntoView({behavior: 'smooth'})} className="bg-transparent border border-gray-700 hover:border-gray-500 text-white font-bold py-4 px-8 rounded-xl transition-all text-lg text-center">
                                View Case Studies
                            </button>
                        </div>
                    </div>

                    <div id="audit-tool" className="bg-[#0A0A0A] border border-gray-800 rounded-3xl p-8 lg:p-10 shadow-[0_0_50px_rgba(0,82,255,0.15)] relative overflow-hidden min-h-[500px] flex flex-col justify-center">
                        <div className="absolute -top-32 -right-32 w-80 h-80 bg-brand-blue opacity-10 blur-[120px] rounded-full pointer-events-none"></div>

                        {step === 1 && (
                            <div className="relative z-10 animate-fade-in">
                                <div className="text-brand-blue font-semibold text-xs mb-4 tracking-wider uppercase">Audit • Step 1 of 6</div>
                                <h2 className="text-2xl font-bold mb-6 text-white leading-snug">What is your current annual revenue?</h2>
                                <div className="space-y-3">
                                    {['$1M - $3M', '$3M - $5M', '$5M - $10M+'].map((opt) => (
                                        <button key={opt} onClick={() => advance('revenue', opt)} className="w-full text-left p-4 border border-gray-700 rounded-xl hover:border-brand-blue hover:bg-brand-blue/10 transition-all font-medium text-gray-200">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="relative z-10 animate-fade-in">
                                <div className="text-brand-blue font-semibold text-xs mb-4 tracking-wider uppercase">Audit • Step 2 of 6</div>
                                <h2 className="text-2xl font-bold mb-6 text-white leading-snug">Number of employees?</h2>
                                <div className="space-y-3">
                                    {['1-10', '11-50', '50+'].map((opt) => (
                                        <button key={opt} onClick={() => advance('employees', opt)} className="w-full text-left p-4 border border-gray-700 rounded-xl hover:border-brand-blue hover:bg-brand-blue/10 transition-all font-medium text-gray-200">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="relative z-10 animate-fade-in">
                                <div className="text-brand-blue font-semibold text-xs mb-4 tracking-wider uppercase">Audit • Step 3 of 6</div>
                                <h2 className="text-2xl font-bold mb-6 text-white leading-snug">Monthly customer support tickets?</h2>
                                <div className="space-y-3">
                                    {['Under 500', '500 - 2,000', '2,000+'].map((opt) => (
                                        <button key={opt} onClick={() => advance('tickets', opt)} className="w-full text-left p-4 border border-gray-700 rounded-xl hover:border-brand-blue hover:bg-brand-blue/10 transition-all font-medium text-gray-200">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="relative z-10 animate-fade-in">
                                <div className="text-brand-blue font-semibold text-xs mb-4 tracking-wider uppercase">Audit • Step 4 of 6</div>
                                <h2 className="text-2xl font-bold mb-6 text-white leading-snug">Biggest operational bottleneck?</h2>
                                <div className="space-y-3">
                                    {['Customer Support Overload', 'Messy CRM & Data Entry', 'Fulfillment & Inventory Tracking'].map((opt) => (
                                        <button key={opt} onClick={() => advance('bottleneck', opt)} className="w-full text-left p-4 border border-gray-700 rounded-xl hover:border-brand-blue hover:bg-brand-blue/10 transition-all font-medium text-gray-200">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="relative z-10 animate-fade-in">
                                <div className="text-brand-blue font-semibold text-xs mb-4 tracking-wider uppercase">Audit • Step 5 of 6</div>
                                <h2 className="text-2xl font-bold mb-6 text-white leading-snug">Current Software Stack?</h2>
                                <div className="space-y-3">
                                    {['Shopify + Basic Apps', 'Shopify + Gorgias + Klaviyo', 'Custom / Enterprise ERP'].map((opt) => (
                                        <button key={opt} onClick={() => advance('software', opt)} className="w-full text-left p-4 border border-gray-700 rounded-xl hover:border-brand-blue hover:bg-brand-blue/10 transition-all font-medium text-gray-200">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 6 && (
                            <div className="relative z-10 text-center animate-fade-in">
                                <h2 className="text-3xl font-bold mb-4 text-white">Analysis Ready.</h2>
                                <p className="text-gray-400 mb-8 text-sm px-4">Enter your work email to generate your custom Efficiency Score and view your projected ROI instantly.</p>
                                <input type="email" placeholder="founder@ecommerce.com" className="w-full p-4 bg-black border border-gray-700 rounded-xl mb-4 text-white focus:outline-none focus:border-brand-blue text-center" value={auditData.email} onChange={(e) => handleInput('email', e.target.value)} />
                                <button onClick={runRealAudit} disabled={!auditData.email} className="w-full bg-brand-blue hover:bg-brand-hover disabled:opacity-50 disabled:hover:bg-brand-blue text-white font-bold py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(0,82,255,0.3)] text-lg">
                                    View My Audit Results
                                </button>
                            </div>
                        )}

                        {step === 7 && isCalculating && (
                            <div className="relative z-10 text-center py-12 animate-fade-in">
                                <div className="w-16 h-16 border-4 border-brand-blue border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                                <h3 className="text-xl font-bold text-gray-200">Analyzing Operational Inefficiencies...</h3>
                                <p className="text-gray-500 text-sm mt-3">Identifying revenue leaks and automation opportunities.</p>
                            </div>
                        )}

                        {step === 7 && !isCalculating && result && (
                            <div className="relative z-10 animate-fade-in overflow-y-auto max-h-[600px] pr-2">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="inline-block bg-green-500/10 border border-green-500/30 text-green-400 px-3 py-1 rounded-full text-xs font-semibold">
                                        ✓ Audit Sent to Inbox
                                    </div>
                                    <div className="text-xs text-brand-blue">Report for {auditData.email}</div>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-3 mb-4">
                                    <div className="bg-black p-4 border border-gray-800 rounded-xl text-center">
                                        <div className="text-[10px] text-gray-500 mb-1 uppercase tracking-wider">Score</div>
                                        <div className={`text-2xl font-black ${result.efficiencyScore > 70 ? 'text-green-500' : 'text-yellow-500'}`}>{result.efficiencyScore}</div>
                                    </div>
                                    <div className="bg-black p-4 border border-gray-800 rounded-xl text-center">
                                        <div className="text-[10px] text-gray-500 mb-1 uppercase tracking-wider">Savings</div>
                                        <div className="text-2xl font-black text-brand-blue">{result.estSavings}</div>
                                    </div>
                                    <div className="bg-black p-4 border border-gray-800 rounded-xl text-center">
                                        <div className="text-[10px] text-gray-500 mb-1 uppercase tracking-wider">Hours</div>
                                        <div className="text-2xl font-black text-white">{result.estHoursSaved}</div>
                                    </div>
                                </div>

                                <div className="bg-black p-5 border border-gray-800 rounded-xl mb-4">
                                    <div className="text-xs text-red-400 mb-2 uppercase tracking-wider font-semibold">Primary Bottleneck</div>
                                    <div className="text-sm font-medium text-gray-200 leading-relaxed">{result.bottleneckDetail}</div>
                                </div>

                                <div className="bg-black p-6 border border-gray-800 rounded-xl mt-6">
                                    <h3 className="text-lg font-bold mb-4 text-center">Ready to implement these savings?</h3>
                                    <p className="text-sm text-gray-400 mb-4 text-center">Book your Strategy Call directly on our calendar below.</p>
                                    
                                    {/* Real Calendly Embed */}
                                    <div className="w-full h-[400px] overflow-hidden rounded-lg bg-white relative">
                                        <iframe 
                                            src="https://calendly.com/opspilot-demo/strategy?embed_domain=opspilot.com&embed_type=Inline&hide_gdpr_banner=1" 
                                            width="100%" 
                                            height="100%" 
                                            frameBorder="0"
                                            title="Schedule Strategy Call"
                                        ></iframe>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </main>
            );
        };

        const App = () => {
            const scrollToCalendly = () => {
                const el = document.getElementById('audit-tool');
                if(el) el.scrollIntoView({behavior: 'smooth'});
            };

            return (
                <div className="antialiased selection:bg-brand-blue selection:text-white relative">
                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 glass-panel border-b border-gray-900 transition-all">
                        <div className="flex items-center justify-between px-6 py-4 max-w-7xl mx-auto">
                            <div className="text-2xl font-extrabold tracking-tighter cursor-pointer">
                                Ops<span className="text-brand-blue">Pilot</span>
                            </div>
                            <div className="hidden md:flex space-x-8 text-gray-400 text-sm font-medium">
                                <a href="#services" className="hover:text-white transition-colors">Offers</a>
                                <a href="#case-studies" className="hover:text-white transition-colors">Case Studies</a>
                                <a href="#pricing" className="hover:text-white transition-colors">Pricing</a>
                                <a href="#blog" className="hover:text-white transition-colors">Insights</a>
                            </div>
                            <button onClick={scrollToCalendly} className="text-white font-medium text-sm transition-colors border border-gray-700 px-5 py-2.5 rounded-lg hover:bg-white hover:text-black hidden md:block">
                                Book Strategy Call
                            </button>
                        </div>
                    </nav>

                    <HeroAudit />
                    <HowItWorks />
                    
                    {/* Trust Section */}
                    <section className="border-t border-b border-gray-900 bg-black py-16">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <h3 className="text-xl font-semibold text-gray-400 mb-10">Why E-commerce Operators Work With OpsPilot</h3>
                            <div className="flex flex-wrap justify-center gap-8 md:gap-16">
                                {['Faster Support Response', 'Reduced Manual Work', 'Cleaner Customer Data', 'Better Reporting Visibility', 'Scalable Operations'].map((trust, i) => (
                                    <div key={i} className="flex items-center text-gray-300 font-medium">
                                        <CheckIcon /> {trust}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Case Studies Section */}
                    <section id="case-studies" className="bg-brand-dark py-24">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-bold mb-4">Proven E-Commerce Results</h2>
                                <p className="text-gray-400 max-w-2xl mx-auto">Real outcomes from mid-market brands automating their operations.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {/* Case Study 1 */}
                                <div className="bg-black border border-gray-800 p-8 rounded-2xl flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-4 text-white">Mid-Market Apparel Brand</h3>
                                        <div className="mb-4">
                                            <span className="text-red-400 font-semibold text-sm uppercase tracking-wide block mb-1">Challenge:</span>
                                            <p className="text-sm text-gray-400">Support team overwhelmed by repetitive sizing and shipping tickets.</p>
                                        </div>
                                        <div className="mb-6">
                                            <span className="text-brand-blue font-semibold text-sm uppercase tracking-wide block mb-1">Solution:</span>
                                            <p className="text-sm text-gray-400">Implemented AI support automation and automated CRM ticket routing.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-4 border-t border-gray-800">
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Annual Savings</span><span className="text-white font-bold">$38,000</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Monthly Hours Saved</span><span className="text-white font-bold">31 Hours</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Support Speed</span><span className="text-green-400 font-bold">72% Faster</span></div>
                                    </div>
                                </div>
                                {/* Case Study 2 */}
                                <div className="bg-black border border-gray-800 p-8 rounded-2xl flex flex-col justify-between relative border-t-4 border-t-brand-blue">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-4 text-white">High-Growth DTC Brand</h3>
                                        <div className="mb-4">
                                            <span className="text-red-400 font-semibold text-sm uppercase tracking-wide block mb-1">Challenge:</span>
                                            <p className="text-sm text-gray-400">Messy customer data causing high cart abandonment and lost repurchases.</p>
                                        </div>
                                        <div className="mb-6">
                                            <span className="text-brand-blue font-semibold text-sm uppercase tracking-wide block mb-1">Solution:</span>
                                            <p className="text-sm text-gray-400">Built CRM cleanup pipeline and triggered targeted retention workflows.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-4 border-t border-gray-800">
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Recovered Revenue</span><span className="text-brand-blue font-bold">$47,000</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Monthly Hours Saved</span><span className="text-white font-bold">34 Hours</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-400 text-sm">Email Conversion</span><span className="text-green-400 font-bold">+18%</span></div>
                                    </div>
                                </div>
                                {/* Case Study 3 */}
                                <div className="bg-black border border-gray-800 p-8 rounded-2xl flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-4 text-white">E-commerce Home Goods</h3>
                                        <div className="mb-4">
                                            <span className="text-red-400 font-semibold text-sm uppercase tracking-wide block mb-1">Challenge:</span>
                                            <p className="text-sm text-gray-400">Manual data entry between Shopify and global fulfillment suppliers.</p>
                                        </div>
