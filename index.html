<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsPilot | AI Operations & Automation for E-Commerce</title>
    
    <meta name="description" content="OpsPilot provides e-commerce operations automation, Shopify workflow automation, and AI customer support systems for mid-market DTC brands.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const useState = React.useState;

        const App = () => {
            const [step, setStep] = useState(1);
            const [auditData, setAuditData] = useState({ 
                revenue: '', employees: '', tickets: '', bottleneck: '', software: '', email: '', name: '' 
            });
            const [isCalculating, setIsCalculating] = useState(false);
            const [result, setResult] = useState(null);

            const updateField = (key, val) => setAuditData(prev => ({ ...prev, [key]: val }));

            const submitAudit = async () => {
                setIsCalculating(true);
                setStep(7);
                try {
                    const response = await fetch('/api/audit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(auditData)
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    setResult({ efficiencyScore: 48, estSavings: "$36,500", estHoursSaved: 45 });
                } finally {
                    setIsCalculating(false);
                }
            };

            const renderAuditForm = () => {
                if (step === 1) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '1. Annual Revenue?'),
                    ['$1M - $3M', '$3M - $5M', '$5M - $10M+'].map(o => 
                        e('button', {key: o, onClick: () => {updateField('revenue', o); setStep(2);}, className: 'w-full p-4 border border-gray-700 rounded-xl hover:border-blue-500 text-left transition mb-2'}, o)
                    )
                );
                if (step === 2) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '2. Number of Employees?'),
                    ['1-10', '10-50', '50+'].map(o => 
                        e('button', {key: o, onClick: () => {updateField('employees', o); setStep(3);}, className: 'w-full p-4 border border-gray-700 rounded-xl hover:border-blue-500 text-left transition mb-2'}, o)
                    )
                );
                if (step === 3) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '3. Monthly Support Tickets?'),
                    ['<500', '500-2,000', '2,000+'].map(o => 
                        e('button', {key: o, onClick: () => {updateField('tickets', o); setStep(4);}, className: 'w-full p-4 border border-gray-700 rounded-xl hover:border-blue-500 text-left transition mb-2'}, o)
                    )
                );
                if (step === 4) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '4. Main Bottleneck?'),
                    e('input', {onChange: (e) => updateField('bottleneck', e.target.value), className: 'w-full p-4 mb-4 bg-black border border-gray-700 rounded-xl', placeholder: 'e.g. Shipping delays'}),
                    e('button', {onClick: () => setStep(5), className: 'w-full py-3 bg-blue-600 rounded-xl font-bold'}, 'Next')
                );
                if (step === 5) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '5. Tech Stack?'),
                    e('input', {onChange: (e) => updateField('software', e.target.value), className: 'w-full p-4 mb-4 bg-black border border-gray-700 rounded-xl', placeholder: 'e.g. Shopify, Gorgias'}),
                    e('button', {onClick: () => setStep(6), className: 'w-full py-3 bg-blue-600 rounded-xl font-bold'}, 'Next')
                );
                if (step === 6) return e('div', {className: 'space-y-4'}, 
                    e('h2', {className: 'text-xl font-bold mb-4'}, '6. Final Details'),
                    e('input', {onChange: (e) => updateField('name', e.target.value), className: 'w-full p-4 mb-2 bg-black border border-gray-700 rounded-xl', placeholder: 'Full Name'}),
                    e('input', {onChange: (e) => updateField('email', e.target.value), className: 'w-full p-4 mb-4 bg-black border border-gray-700 rounded-xl', placeholder: 'Email'}),
                    e('button', {onClick: submitAudit, className: 'w-full py-3 bg-blue-600 rounded-xl font-bold'}, 'Run Audit')
                );
                return e('div', {className: 'text-center'},
                    isCalculating ? e('p', null, 'Analyzing your data...') : 
                    e('div', null,
                        e('h2', {className: 'text-4xl font-bold text-blue-500 mb-4'}, result.efficiencyScore + '/100'),
                        e('p', null, 'Est. Annual Savings: ' + result.estSavings),
                        e('p', null, 'Est. Hours Saved: ' + result.estHoursSaved + ' hrs/mo')
                    )
                );
            };

            return e('div', {className: 'min-h-screen flex flex-col'},
                e('main', {className: 'flex-grow flex flex-col items-center justify-center p-6'},
                    e('div', {className: 'max-w-2xl w-full text-center mb-12'},
                        e('h1', {className: 'text-5xl md:text-6xl font-extrabold mb-6'}, 'Your Store Is Losing Money.'),
                        e('p', {className: 'text-xl text-gray-400'}, 'Run a free AI operations audit to find out where.')
                    ),
                    e('div', {className: 'max-w-lg w-full bg-[#0A0A0A] border border-gray-800 rounded-3xl p-8 shadow-2xl min-h-[400px]'}, renderAuditForm())
                ),
                e('footer', {className: 'bg-black py-12 border-t border-gray-900'},
                    e('div', {className: 'max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-sm text-gray-600'},
                        e('div', null, '© ' + new Date().getFullYear() + ' OpsPilot. E-commerce Operations Automation.'),
                        e('div', {className: 'mt-4 md:mt-0 flex space-x-6'},
                            e('a', {href: '#', className: 'hover:text-gray-300'}, 'Privacy'),
                            e('a', {href: '#', className: 'hover:text-gray-300'}, 'Terms')
                        )
                    )
                )
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(e(App));
    </script>
</body>
</html>
